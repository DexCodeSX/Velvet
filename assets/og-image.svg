<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060A"/>
      <stop offset="50%" stop-color="#0A0A12"/>
      <stop offset="100%" stop-color="#08081A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="toggleOn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#9B7BFF"/>
    </linearGradient>
    <linearGradient id="toggleOff" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A2A35"/>
      <stop offset="100%" stop-color="#1E1E28"/>
    </linearGradient>
    <linearGradient id="sliderFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="60%" stop-color="#9B7BFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="glassBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- ambient glow blobs (no filter, just big low-opacity ellipses) -->
  <ellipse cx="350" cy="250" rx="400" ry="300" fill="#7C5CFC" opacity="0.06"/>
  <ellipse cx="950" cy="450" rx="350" ry="250" fill="#5C8CFC" opacity="0.04"/>

  <!-- subtle grid pattern -->
  <g opacity="0.03" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- floating orbs (no filter, just circles with low opacity) -->
  <circle cx="180" cy="120" r="50" fill="#7C5CFC" opacity="0.08"/>
  <circle cx="1100" cy="180" r="35" fill="#7C5CFC" opacity="0.06"/>
  <circle cx="900" cy="520" r="28" fill="#7C5CFC" opacity="0.05"/>

  <!-- ==================== LEFT SIDE: Title + Info ==================== -->

  <!-- "V" logo mark -->
  <g transform="translate(100, 160)">
    <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#accent)" opacity="0.9"/>
    <text x="36" y="52" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">V</text>
  </g>

  <!-- title -->
  <text x="100" y="300" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" letter-spacing="-1">Velvet</text>

  <!-- subtitle -->
  <text x="102" y="345" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8888AA">Premium UI Library for Roblox</text>

  <!-- feature pills -->
  <g transform="translate(100, 375)">
    <rect x="0" y="0" width="146" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
    <text x="73" y="21" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#A0A0C0" text-anchor="middle">Glassmorphism</text>

    <rect x="158" y="0" width="116" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
    <text x="216" y="21" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#A0A0C0" text-anchor="middle">Animations</text>

    <rect x="286" y="0" width="126" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
    <text x="349" y="21" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#A0A0C0" text-anchor="middle">PC + Mobile</text>
  </g>

  <!-- accent underline -->
  <rect x="100" y="430" width="80" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- github handle -->
  <text x="102" y="468" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#666680">github.com/DexCodeSX/Velvet</text>

  <!-- bottom badges row -->
  <g transform="translate(100, 500)">
    <rect x="0" y="0" width="62" height="26" rx="6" fill="#7C5CFC" fill-opacity="0.15"/>
    <text x="31" y="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#A78BFA" text-anchor="middle">MIT</text>

    <rect x="74" y="0" width="74" height="26" rx="6" fill="#7C5CFC" fill-opacity="0.15"/>
    <text x="111" y="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#A78BFA" text-anchor="middle">Lua 5.1</text>

    <rect x="160" y="0" width="100" height="26" rx="6" fill="#7C5CFC" fill-opacity="0.15"/>
    <text x="210" y="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#A78BFA" text-anchor="middle">Open Source</text>
  </g>

  <!-- ==================== RIGHT SIDE: UI Preview ==================== -->

  <!-- drop shadow behind window (manual, no filter) -->
  <rect x="624" y="68" width="580" height="520" rx="14" fill="#000000" opacity="0.4"/>

  <!-- main window -->
  <g transform="translate(620, 60)">
    <!-- window bg -->
    <rect x="0" y="0" width="580" height="520" rx="12" fill="#0D0D14" stroke="url(#glassBorder)" stroke-width="1"/>

    <!-- title bar bg -->
    <rect x="0" y="0" width="580" height="44" rx="12" fill="#FFFFFF" fill-opacity="0.04"/>
    <rect x="0" y="32" width="580" height="12" fill="#FFFFFF" fill-opacity="0.04"/>
    <!-- window dots -->
    <circle cx="24" cy="22" r="6" fill="#FF5F57" opacity="0.8"/>
    <circle cx="44" cy="22" r="6" fill="#FFBD2E" opacity="0.8"/>
    <circle cx="64" cy="22" r="6" fill="#28CA42" opacity="0.8"/>
    <text x="290" y="28" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="14" fill="#E0E0F0" text-anchor="middle" opacity="0.8">Velvet Demo</text>

    <!-- sidebar -->
    <rect x="0" y="44" width="140" height="476" fill="#FFFFFF" fill-opacity="0.02"/>
    <line x1="140" y1="44" x2="140" y2="520" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>

    <!-- sidebar tabs -->
    <!-- active tab -->
    <rect x="8" y="58" width="124" height="36" rx="8" fill="#7C5CFC" fill-opacity="0.15"/>
    <rect x="8" y="58" width="3" height="36" rx="1.5" fill="url(#accent)"/>
    <text x="24" y="81" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="13" fill="#E0E0F0">Combat</text>

    <!-- inactive tabs -->
    <text x="24" y="118" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#666680">Visuals</text>
    <text x="24" y="152" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#666680">Misc</text>
    <text x="24" y="186" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#666680">Settings</text>

    <!-- ====== content area ====== -->

    <!-- section header -->
    <text x="160" y="78" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#8888AA" letter-spacing="1">AIMBOT</text>
    <line x1="160" y1="88" x2="560" y2="88" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>

    <!-- Toggle 1: Enable Aimbot (ON) -->
    <g transform="translate(160, 100)">
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#FFFFFF" fill-opacity="0.03"/>
      <text x="16" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="14" fill="#D0D0E8">Enable Aimbot</text>
      <rect x="348" y="10" width="40" height="22" rx="11" fill="url(#toggleOn)"/>
      <circle cx="377" cy="21" r="8" fill="#FFFFFF"/>
    </g>

    <!-- Toggle 2: Silent Aim (OFF) -->
    <g transform="translate(160, 150)">
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#FFFFFF" fill-opacity="0.03"/>
      <text x="16" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="14" fill="#D0D0E8">Silent Aim</text>
      <rect x="348" y="10" width="40" height="22" rx="11" fill="url(#toggleOff)"/>
      <circle cx="359" cy="21" r="8" fill="#888888"/>
    </g>

    <!-- Slider: FOV Radius -->
    <g transform="translate(160, 200)">
      <rect x="0" y="0" width="400" height="52" rx="8" fill="#FFFFFF" fill-opacity="0.03"/>
      <text x="16" y="22" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="14" fill="#D0D0E8">FOV Radius</text>
      <text x="372" y="22" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="13" fill="#A78BFA" text-anchor="end">150px</text>
      <rect x="16" y="34" width="368" height="4" rx="2" fill="#1A1A25"/>
      <rect x="16" y="34" width="184" height="4" rx="2" fill="url(#sliderFill)"/>
      <circle cx="200" cy="36" r="7" fill="#FFFFFF" stroke="#7C5CFC" stroke-width="2"/>
    </g>

    <!-- Dropdown: Target Part -->
    <g transform="translate(160, 260)">
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#FFFFFF" fill-opacity="0.03"/>
      <text x="16" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="14" fill="#D0D0E8">Target Part</text>
      <rect x="290" y="8" width="98" height="26" rx="6" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
      <text x="328" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="12" fill="#A0A0C0">Head</text>
      <path d="M374,19 L378,24 L382,19" stroke="#666680" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Keybind -->
    <g transform="translate(160, 310)">
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#FFFFFF" fill-opacity="0.03"/>
      <text x="16" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="14" fill="#D0D0E8">Aim Key</text>
      <rect x="348" y="8" width="40" height="26" rx="6" fill="#7C5CFC" fill-opacity="0.15" stroke="#7C5CFC" stroke-opacity="0.3" stroke-width="1"/>
      <text x="368" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="12" fill="#A78BFA" text-anchor="middle">E</text>
    </g>

    <!-- Section header 2 -->
    <text x="160" y="380" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#8888AA" letter-spacing="1">VISUALS</text>
    <line x1="160" y1="390" x2="560" y2="390" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>

    <!-- Toggle 3: ESP -->
    <g transform="translate(160, 402)">
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#FFFFFF" fill-opacity="0.03"/>
      <text x="16" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="14" fill="#D0D0E8">Enable ESP</text>
      <rect x="348" y="10" width="40" height="22" rx="11" fill="url(#toggleOn)"/>
      <circle cx="377" cy="21" r="8" fill="#FFFFFF"/>
    </g>

    <!-- Color picker inline -->
    <g transform="translate(160, 452)">
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#FFFFFF" fill-opacity="0.03"/>
      <text x="16" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="14" fill="#D0D0E8">ESP Color</text>
      <rect x="354" y="10" width="34" height="22" rx="6" fill="#FF3232" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
    </g>
  </g>

  <!-- notification toast -->
  <g transform="translate(920, 30)">
    <rect x="2" y="4" width="260" height="56" rx="10" fill="#000000" opacity="0.35"/>
    <rect x="0" y="0" width="260" height="56" rx="10" fill="#0D0D14" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="56" rx="2" fill="#28CA42"/>
    <text x="18" y="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="12" fill="#E0E0F0">Script Loaded</text>
    <text x="18" y="40" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="11" fill="#8888AA">All modules initialized.</text>
  </g>
</svg>
